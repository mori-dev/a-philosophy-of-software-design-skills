---
# APoSD Red Flags Reference
# Each red flag describes a pattern that likely indicates complexity hiding maintainability issues.
# Use these as a code review checklist.
#
# Provenance (verified against "A Philosophy of Software Design", Ousterhout):
#   - `book_red_flag: true`  → one of the 14 named red flags in the book's
#     "Summary of Red Flags". The `book_ref` field gives the 1st-edition chapter.
#   - `book_red_flag: false` → a detection pattern this skill adds. Two of these
#     (change_amplification, cognitive_load) are the book's *symptoms of
#     complexity* from Chapter 2, not red flags; the others are derived checks.
# The 14 canonical red flags: shallow_module, information_leakage,
# temporal_decomposition, overexposure, pass_through_abstraction, repetition,
# special_case_mixture, conjoined_methods, comments_repeat_code,
# implementation_doc_contaminates_interface, vague_naming, hard_to_pick_name,
# hard_to_describe, nonobvious_code.
#
# Avoiding false positives (the book stresses that any principle can be overdone):
# many flags carry a `not_a_red_flag_when` field listing cases where the pattern is
# legitimate and must NOT be reported. During review, flag only the AVOIDABLE
# instance, weight severity by how exposed the code is (public API > internal), and
# set Confidence: Low when a flag is a hint (hard_to_pick_name, hard_to_describe)
# rather than a defect. Do not report a finding that matches a `not_a_red_flag_when`.

red_flags:
  - id: shallow_module
    name: Shallow Module
    severity: high
    book_red_flag: true
    book_ref: "Ch 4.6"
    description: Interface is complex relative to the implementation it provides.
    not_a_red_flag_when:
      - The thin module sits at a genuine abstraction boundary (e.g. an adapter isolating an external API or library)
      - The module is small because the problem is small, and a deeper one would just bundle unrelated things
      - Depth is constrained by an external contract you do not own (framework interface, protocol)
    symptoms:
      - Interface documentation is longer than the implementation
      - Each method does very little work
      - Many helper methods that feel like they should be used by callers
      - Feel like you're orchestrating internal logic when using this module
    questions:
      - What would happen if this interface were twice as powerful?
      - Could the caller's code be simpler if this module did more?
      - Is this module hiding its implementation, or just wrapping another module?
    example_wrong: |
      # UserRepository is shallow
      class UserRepository:
          def get_by_id(self, id):
              return db.query('SELECT * FROM users WHERE id = ?', id)
          def get_by_email(self, email):
              return db.query('SELECT * FROM users WHERE email = ?', email)
          def create(self, user):
              return db.insert('users', user)
    example_right: |
      # UserRepository is deep - hides SQL, handles caching/validation
      class UserRepository:
          def find(self, **filters):
              # Internally: caching, query building, validation
              # Caller doesn't care about SQL or db schema
              ...
    fixes:
      - Combine multiple methods that share responsibility
      - Make the module handle more complex decisions internally
      - Hide storage details (SQL, ORM, API calls) completely
      - Consider merging with related modules
    follow_up_issues:
      - Often paired with information_leakage or change_amplification

  - id: information_leakage
    name: Information Leakage
    severity: high
    book_red_flag: true
    book_ref: "Ch 5.2"
    description: Callers must know too much about internal structure or decisions.
    not_a_red_flag_when:
      - The shared type IS the intended contract (a DTO/value object deliberately designed for callers), not an internal detail
      - The information is inherent to the domain and every reasonable design would expose it
      - Two modules legitimately share a concept defined in one well-named place (that is reuse, not leakage)
    symptoms:
      - Caller imports internal types, constants, or submodules
      - Caller must check storage format or db schema to use this module
      - Caller receives entity + metadata (e.g., is_cached=True, source='db')
      - API response mirrors database schema exactly
    questions:
      - What would break if the internal storage changed (db→API, SQL→ORM)?
      - Is the caller aware of implementation detail it shouldn't be?
      - Could this information be hidden by a more powerful interface?
    example_wrong: |
      # Caller knows internal User structure
      from users.models import User, UserStatus  # Internal type
      user = repo.get(id)
      if user.status == UserStatus.PENDING:  # Knows about internal enum
          ...
    example_right: |
      # UserRepository hides all structure
      user = repo.find_verified(id)  # More powerful, simpler interface
      if user:  # Repository already filters, caller doesn't need to know status enum
          ...
    fixes:
      - Move internal types behind the interface; expose only through methods
      - Change interface to express what callers need, not internal structure
      - Hide storage details (db, ORM, API schema) entirely
      - Return richer types from fewer methods instead of many thin accessors
    follow_up_issues:
      - Often leads to change_amplification when internal structure shifts

  - id: change_amplification
    name: Change Amplification
    severity: high
    book_red_flag: false  # Symptom of complexity (Ch 2), not one of the named red flags
    description: A single logical change requires modifications in many places.
    not_a_red_flag_when:
      - The change is inherently cross-cutting (a new user-visible field legitimately touches model, API, and UI)
      - The touched files are tests plus their single subject (expected, not amplification)
      - Gathering the logic into one place would create a worse coupling than the spread
    symptoms:
      - Bug fix touches 5+ files
      - Renaming one field cascades through layers
      - Adding one feature requires changes in repository, service, controller, and test
      - Special case logic spread across multiple modules
    questions:
      - How many places would I need to change to do X?
      - Could this logic be gathered into one module?
      - Are layers just forwarding data instead of making decisions?
    example_wrong: |
      # Change to User.email cascades everywhere
      # models.py: User model
      # repository.py: SELECT * FROM users
      # service.py: user.email
      # api.py: return {'email': user.email}
      # The change touches all layers even though it's one concept
    example_right: |
      # Repository handles mapping, service hides User type, API returns opaque response
      # Change to internal storage only touches repository
      class UserRepository:
          def find_by_email(self, email):
              # SQL change stays here
              ...
    fixes:
      - Gather scattered logic into one module
      - Remove pass-through layers (repository ↔ service ↔ controller)
      - Let modules make internal decisions instead of forwarding state
      - Encapsulate special cases
    related_flags:
      - shallow_module
      - information_leakage

  - id: vague_naming
    name: Vague Naming
    severity: medium
    book_red_flag: true
    book_ref: "Ch 14.3"
    description: Function/class names don't clearly express what they do.
    symptoms:
      - Names like `process`, `handle`, `convert`, `data`, `manager`, `util`
      - Name doesn't hint at purpose (what does `transform` do? to what?)
      - Hard to describe the function without reading its body
      - Similar names for different purposes (process_user, process_payment)
    questions:
      - If I heard only the name, could I guess what this does?
      - Could I describe this function's purpose in one clear sentence?
      - Are there similar-sounding functions that do different things?
    example_wrong: |
      def process_data(items):
          # What kind of processing? Unclear.
          ...
      def convert(user):
          # To what? From what? Unclear.
          ...
    example_right: |
      def filter_active_users(users):
          # Clear: filters for active status
          ...
      def to_api_response(user):
          # Clear: converts internal User to API format
          ...
    fixes:
      - Use verbs that clearly state the action (filter, map, flatten, validate)
      - Include the subject and result (user→response, data→formatted_csv)
      - Break into multiple functions with distinct names if the name is complex
      - Consider renaming if the name requires a comment
    follow_up_issues:
      - Often hides cognitive_load; callers must read code to understand intent

  - id: special_case_mixture
    name: Special-Case Mixture
    severity: medium
    book_red_flag: true
    book_ref: "Ch 9.5"  # "Special-General Mixture" in the book
    description: General logic mixed with special cases for specific callers.
    symptoms:
      - Many if/else branches checking the caller or context
      - Parameters like `for_admin=True`, `skip_validation=True`
      - Comments like "in case X, do Y instead"
      - New callers add new branches instead of using the general case
    questions:
      - Why does this logic need to know about its caller?
      - Could each caller have a simpler, more specific interface?
      - Is this a general algorithm with exceptions, or multiple algorithms mixed?
    example_wrong: |
      def save_user(user, is_admin=False, skip_validation=False):
          if not skip_validation:
              validate(user)
          if is_admin:
              # Admin-only logic
              ...
          else:
              # Regular user logic
              ...
    example_right: |
      def save_user(user):
          # Single, validated path
          validate(user)
          ...
      # Admin caller uses different, explicit interface:
      def save_user_admin_override(user):
          # Admin-specific logic, clear intent
          ...
    fixes:
      - Split into multiple functions, each with clear purpose
      - Let the caller choose which interface to use
      - If truly one algorithm, move special cases into helper modules
      - Question whether special cases should exist at all
    related_flags:
      - cognitive_load
      - vague_naming

  - id: excessive_configuration
    name: Excessive Configuration
    severity: low
    book_red_flag: false  # Derived check; relates to "define errors/special cases out of existence" and configuration parameters (Ch 10, 19.5)
    description: Too many flags/options replacing hard design decisions.
    not_a_red_flag_when:
      - The options reflect genuine external requirements the module cannot decide for the caller (e.g. real deployment differences)
      - Each option has a sensible default and the common call uses none of them
      - The configuration is a small, validated set where invalid combinations are made unrepresentable
    symptoms:
      - Constructor or function signature has 5+ boolean or enum parameters
      - Config class with 20+ optional fields
      - Comments like "set this to enable X feature"
      - Some flag combinations are invalid, not documented
    questions:
      - What decision is this flag deferring?
      - Should this decision be made by the caller, or determined internally?
      - Could valid configurations be reduced by making hard choices?
    example_wrong: |
      cache = Cache(
          ttl=300,
          eviction_policy='lru',
          distributed=True,
          compression=True,
          encryption=True,
          metrics_enabled=True
      )
      # Too many decisions pushed to caller
    example_right: |
      cache = Cache(ttl=300)
      # Or two clear, simpler classes:
      cache_local = LocalCache()
      cache_distributed = DistributedSecureCache()  # Includes sensible defaults
    fixes:
      - Make hard internal decisions; expose only what must be configured
      - If many options are needed, split into multiple, simpler classes
      - Document which combinations are valid
      - Prefer builder or factory patterns if configuration is genuinely needed
    follow_up_issues:
      - Often pairs with cognitive_load and shallow_module

  - id: cognitive_load
    name: Cognitive Load
    severity: medium
    book_red_flag: false  # Symptom of complexity (Ch 2), not one of the named red flags
    description: Too much mental overhead needed to use or understand this module.
    symptoms:
      - State machine spread across multiple functions and files
      - Long conditional chains or nested logic
      - Function signature with 7+ parameters
      - Documentation longer than code
      - Need to trace 3+ files to understand one flow
    questions:
      - How many things must I hold in mind to use this correctly?
      - Could this module be simpler if it made more decisions internally?
      - Is there a state machine here that should be explicit?
    example_wrong: |
      def process_order(order, user, inventory, payment_processor, logger, metrics):
          # 6 parameters; caller must orchestrate logic
          if not check_user(user):
              logger.error(...)
          if not inventory.has(order.items):
              raise OutOfStock()
          if not payment_processor.charge(payment_info):
              raise PaymentFailed()
          # etc.
    example_right: |
      def place_order(order_request):
          # Module hides complexity: user check, inventory, payment, logging
          order = Order.from_request(order_request)
          order.validate()  # Does all the checks internally
          return order
    fixes:
      - Reduce function parameters (gather related ones into objects)
      - Push decision logic into the module; simplify caller's code
      - Use clear abstractions (state machines, enums) for complex flows
      - Add intermediate functions to hide nested complexity
    related_flags:
      - shallow_module
      - excessive_configuration
      - vague_naming

  - id: pass_through_abstraction
    name: Pass-Through Abstraction
    severity: medium
    book_red_flag: true
    book_ref: "Ch 7.1"  # "Pass-Through Method" in the book
    description: Layer that does nothing but forward calls between other layers.
    not_a_red_flag_when:
      - The forwarding method is a stable public/API facade deliberately decoupling callers from a volatile implementation
      - It is a required interface implementation (adapter, port) where forwarding is the contract
      - It adds a real concern even if thin (auth check, transaction boundary, telemetry)
    symptoms:
      - Method that just calls the same method on a dependency
      - Layers (repository → service → controller) that don't add logic
      - Caller could call the underlying layer directly without loss
      - No state, no caching, no translation, no validation
    questions:
      - Does this layer add any value beyond forwarding?
      - What would break if we removed this layer?
      - Could the caller use the underlying layer directly?
    example_wrong: |
      # service.py
      def get_user(self, id):
          return self.repository.get_user(id)  # Just forwarding

      # controller.py calls service instead of repository
      user = service.get_user(id)
    example_right: |
      # Either merge layers or give service meaningful responsibility:
      def get_user(self, id):
          user = repository.find(id)
          if not user:
              logger.warning(f"User {id} not found")
          return user
    fixes:
      - Merge the layer with what it calls
      - Or add real responsibility (validation, transformation, logging)
      - Question whether you need N layers in the first place
    related_flags:
      - shallow_module
      - change_amplification

  - id: comments_repeat_code
    name: Comments That Repeat Code
    severity: low
    book_red_flag: true
    book_ref: "Ch 13.2"
    description: Comments state what the code does instead of why it does it.
    symptoms:
      - Comments like `x += 1  # increment x`
      - Comments that become outdated immediately
      - Comment explains the code instead of explaining design intent
      - Obvious code followed by unnecessary comments
    questions:
      - Would this code be unclear without the comment?
      - Does the comment explain intent, or just restate what the code does?
      - Could better naming replace this comment?
    example_wrong: |
      # increment counter
      counter += 1

      # check if user is null
      if user is None:
          ...
    example_right: |
      # Comments should explain non-obvious intent or constraints
      # Retry mechanism: if transient error, wait exponentially before retrying
      # (not: "sleep for 100ms")

      # Assume user exists at this point because we validated in auth middleware
      # (not: "check if user is null")
    fixes:
      - Use clearer naming to eliminate need for comment
      - If comment needed, explain the "why", not the "what"
      - Remove comments that duplicate code intent
      - Add comments only for non-obvious design decisions
    follow_up_issues:
      - Often symptom of vague_naming or shallow_module

  - id: unnecessary_error_path_complexity
    name: Unnecessary Error-Path Complexity
    severity: medium
    book_red_flag: false  # Derived check grounded in "Define errors out of existence" (Ch 10)
    description: Error handling scattered and complicated instead of defined out of existence.
    symptoms:
      - Exception types proliferate (CustomError, UserNotFoundError, ValidationError...)
      - Try-catch blocks nested or scattered across the codebase
      - Caller must handle multiple exception types for one operation
      - Error information is missing (no context, no original exception)
      - Some errors are swallowed silently, others bubble up unpredictably
    questions:
      - Could this error be prevented instead of handled?
      - Is the caller responsible for handling this, or the module?
      - Is error information clear enough to debug?
      - Could fewer exception types handle all cases?
    example_wrong: |
      try:
          user = repository.get_user(id)
      except UserNotFoundError:
          user = None
      except DatabaseError:
          raise
      # Caller must know about UserNotFoundError
    example_right: |
      user = repository.find_user(id)  # Returns None instead of raising
      if not user:
          # Caller decides what to do with absence
          ...
    fixes:
      - Define errors out of existence (return None, use Optional types)
      - If exceptions needed, keep types minimal and information rich
      - Handle errors at the source (module validates, not caller)
      - Document which exceptions can be raised and why
    related_flags:
      - information_leakage
      - shallow_module

  - id: temporal_decomposition
    name: Temporal Decomposition
    severity: high
    book_red_flag: true
    book_ref: "Ch 5.3"
    description: Code organized by execution order rather than logical responsibility. Methods divided across objects based on when they run, not what they do.
    symptoms:
      - Stages like init(), setup(), process(), cleanup() split into separate classes
      - Caller orchestrates sequence of calls across multiple objects
      - State passed from one stage to the next (caller must track it)
      - Order dependence is implicit in comments or code flow
    questions:
      - Could these methods be organized by responsibility instead of execution order?
      - Is the caller responsible for calling things in the right order?
      - Would one module doing all these steps be more obvious?
    example_wrong: |
      class PaymentInitializer:
          def verify_user(self, user): ...
      class PaymentProcessor:
          def charge(self, amount): ...
      class PaymentFinalizer:
          def log_transaction(self, txn): ...

      # Caller orchestrates:
      init.verify_user(user)
      processor.charge(amount)
      finalizer.log_transaction(txn)
    example_right: |
      class PaymentService:
          def process_payment(self, user, amount):
              # Knows the sequence; caller doesn't
              self.verify_user(user)
              self.charge(amount)
              self.log_transaction(...)
    fixes:
      - Gather stages into one module that knows the sequence
      - Don't split by execution order; split by responsibility
      - Caller should call one method, not orchestrate multiple objects
    follow_up_issues:
      - Often leads to change_amplification (adding a stage requires changes in multiple places)

  - id: repetition
    name: Repetition
    severity: high
    book_red_flag: true
    book_ref: "Ch 9.4"
    description: Same or similar code duplicated in multiple places. Violates DRY; makes changes ripple.
    not_a_red_flag_when:
      - The similarity is coincidental and the two copies will evolve independently (forcing a shared abstraction would couple them wrongly)
      - Removing the duplication needs a parameter-heavy or conditional abstraction harder to read than the repetition
      - The repeated lines are trivial boilerplate the language/framework requires
    symptoms:
      - Same logic appears in 2+ functions or classes
      - Copy-pasted code with minor variations
      - Changes to logic require updates in multiple places
      - Tests for the same logic in multiple places
    questions:
      - How many places would I need to update if this logic changed?
      - Could these similar pieces share one implementation?
      - Is the duplication intentional (e.g., optimized variants) or accidental?
    example_wrong: |
      class UserRepository:
          def get_active_users(self):
              users = db.query("SELECT * FROM users")
              return [u for u in users if u.status == 'active']

      class OrderRepository:
          def get_recent_orders(self):
              orders = db.query("SELECT * FROM orders")
              return [o for o in orders if o.created_at > cutoff]  # Same filtering pattern
    example_right: |
      class Repository:
          def filter(self, items, predicate):
              return [item for item in items if predicate(item)]

      class UserRepository(Repository):
          def get_active_users(self):
              users = db.query("SELECT * FROM users")
              return self.filter(users, lambda u: u.status == 'active')
    fixes:
      - Extract common logic into a shared method or class
      - Create a utility function for repeated patterns
      - Consider a helper class or mixin to reduce duplication
      - Ask if the duplication is truly intentional
    related_flags:
      - change_amplification
      - shallow_module

  - id: nonobvious_code
    name: Nonobvious Code
    severity: medium
    book_red_flag: true
    book_ref: "Ch 18.2"
    description: Code that requires deep reading to understand. Intent is not obvious from syntax alone.
    symptoms:
      - Complex conditional logic that's hard to parse
      - Clever algorithm without explanation
      - Side effects hidden in function calls
      - Mutation of shared state in non-obvious ways
      - Magic numbers or values without context
    questions:
      - Would someone reading this code understand it in 10 seconds?
      - Could a comment explaining "why" reduce cognitive load?
      - Is the non-obviousness necessary, or could it be simpler?
      - Could a clearer variable name or function name help?
    example_wrong: |
      # What does this do? Why?
      result = (x ^ y) & 0xFF if (x > 100 and not y) else z << 2
    example_right: |
      # Clear intent
      if is_overflow(x) and is_empty(y):
          result = mask_low_byte(x ^ y)
      else:
          result = shift_left_by_two(z)
    fixes:
      - Rename variables to express intent
      - Break complex expressions into named intermediate values
      - Extract complex logic into a clearly-named function
      - Add a comment explaining the "why" if algorithm is inherently complex
    follow_up_issues:
      - Often pairs with cognitive_load

  - id: overexposure
    name: Overexposure
    severity: medium
    book_red_flag: true
    book_ref: "Ch 5.7"
    description: The API forces callers to learn about rarely-used or internal features in order to use common ones.
    symptoms:
      - Common operations require passing options that only matter for edge cases
      - Caller must understand an internal mechanism (mode, strategy, flags) to do the simple thing
      - The "hello world" path of the API is not the shortest path
      - Frequently-used and rarely-used features share one entry point
    questions:
      - Is the common case the simplest case to call?
      - Does the caller have to know about a feature they will never use?
      - Could the rarely-used capability move behind a separate, optional interface?
    example_wrong: |
      # Caller must always supply retry/encoding details just to fetch
      def fetch(url, *, retries, backoff, encoding, verify_tls, proxy):
          ...
      data = fetch(url, retries=0, backoff=0, encoding="utf-8", verify_tls=True, proxy=None)
    example_right: |
      # Common case is trivial; rare options live on a separate path
      data = fetch(url)
      # Advanced callers opt in explicitly:
      data = fetch(url, options=FetchOptions(retries=3, proxy=p))
    fixes:
      - Make the common case callable with the fewest arguments
      - Move rarely-used parameters into an optional options object or a separate method
      - Provide sensible internal defaults instead of forcing the caller to choose
    related_flags:
      - shallow_module
      - excessive_configuration

  - id: conjoined_methods
    name: Conjoined Methods
    severity: medium
    book_red_flag: true
    book_ref: "Ch 9.8"
    description: Two methods are so interdependent that you cannot understand one without reading the other.
    symptoms:
      - Reading method A requires jumping to method B to follow the logic
      - State or invariants are shared implicitly between the two methods
      - A change in one method almost always forces a change in the other
      - The split was made to shorten a method, not to create an independent abstraction
    questions:
      - Can each method be understood on its own, given only its signature and comment?
      - Was this method extracted to reduce length, or because it is a real abstraction?
      - Do the two methods always change together?
    example_wrong: |
      # process() is meaningless without _finish(); they share hidden state
      def process(self, items):
          self._buffer = []
          for i in items:
              self._buffer.append(transform(i))
          self._finish()  # caller of process can't reason about it without reading _finish
      def _finish(self):
          commit(self._buffer)
          self._buffer = None
    example_right: |
      # One cohesive method you can understand top to bottom
      def process(self, items):
          buffer = [transform(i) for i in items]
          commit(buffer)
    fixes:
      - Rejoin the methods if the split only existed to reduce length
      - If a split is warranted, make each side a real abstraction with no shared hidden state
      - Pass shared data as explicit parameters/return values instead of instance state
    related_flags:
      - shallow_module
      - temporal_decomposition

  - id: implementation_doc_contaminates_interface
    name: Implementation Documentation Contaminates Interface
    severity: medium
    book_red_flag: true
    book_ref: "Ch 13.5"
    description: Interface documentation describes implementation details the caller does not need, leaking internals into the contract.
    symptoms:
      - A method's docstring explains how it works internally, not just what it does
      - Interface comments name private helpers, data structures, or algorithms
      - Caller-facing docs change whenever the implementation changes
      - Reader must understand the implementation to understand the interface comment
    questions:
      - Does this interface comment describe what the caller needs, or how the code works?
      - Would this comment have to change if I rewrote the implementation without changing behavior?
      - Are implementation notes mixed into the same comment as the contract?
    example_wrong: |
      def get_user(id):
          """Look up the user by binary-searching the in-memory index array,
          falling back to a SELECT on the users table if the cache is cold."""
          ...
    example_right: |
      def get_user(id):
          """Return the User with the given id, or None if no such user exists."""
          # (Implementation notes about caching live as separate inside-the-body comments.)
          ...
    fixes:
      - Keep interface comments to what the caller needs (inputs, outputs, side effects, errors)
      - Move implementation notes into the method body, separate from the interface comment
      - Document at the level of abstraction the caller works at
    related_flags:
      - information_leakage
      - comments_repeat_code

  - id: hard_to_pick_name
    name: Hard to Pick Name
    severity: low
    book_red_flag: true
    book_ref: "Ch 14.3"
    description: Difficulty finding a simple, precise name for a variable or method hints that the underlying entity lacks a clean design.
    symptoms:
      - The best name you can find is generic (data, info, manager, helper) or a vague compound
      - The name needs "And"/"Or" because the entity does more than one thing
      - You keep renaming it because no name fits
      - A clear name would require several words to be accurate
    questions:
      - Is it hard to name because the entity has more than one responsibility?
      - Would splitting or merging the entity make a clean name obvious?
      - Does the awkward name point at an awkward abstraction?
    example_wrong: |
      # No good name exists because it does two unrelated things
      def handle_user_data_and_notify(user): ...
    example_right: |
      # Each entity has one job, so each name is obvious
      def save_user(user): ...
      def notify_user(user): ...
    fixes:
      - Treat naming difficulty as a design signal, not just a wording problem
      - Split entities that resist a single clear name
      - Reconsider the abstraction so a precise one- or two-word name fits
    related_flags:
      - vague_naming
      - special_case_mixture

  - id: hard_to_describe
    name: Hard to Describe
    severity: low
    book_red_flag: true
    book_ref: "Ch 15.3"
    description: If a simple yet complete comment for a method or variable is hard to write, the thing being described is probably too complex or poorly defined.
    symptoms:
      - The interface comment grows long and still feels incomplete
      - Describing the method requires enumerating special cases and exceptions
      - The comment needs many "unless"/"except when" qualifications
      - You cannot state the method's purpose in one clear sentence
    questions:
      - Can I describe this in one or two simple sentences? If not, why not?
      - Are the special cases I keep listing a sign the abstraction is wrong?
      - Would a deeper or more general design be easier to describe?
    example_wrong: |
      # Comment must list every conditional behavior
      def get(self, key, default, *, refresh, ttl, raise_if_missing):
          """Return value for key. If refresh, reload first. If ttl set, use it
          unless the entry is pinned. If raise_if_missing, raise unless default
          is given, in which case return default except when refresh failed..."""
    example_right: |
      def get(self, key):
          """Return the cached value for key, loading it on a miss."""
          ...
    fixes:
      - Use the difficulty of writing the comment as a redesign trigger
      - Reduce special cases (define them out of existence) so the description shortens
      - Split overloaded methods so each has a one-sentence purpose
    related_flags:
      - hard_to_pick_name
      - excessive_configuration
      - unnecessary_error_path_complexity

# Summary heuristic: if you see 3+ red flags in a module, it's a good refactoring candidate
# Coverage: all 14 named red flags from "A Philosophy of Software Design" are represented
# (book_red_flag: true), plus 4 derived/symptom checks (book_red_flag: false).
